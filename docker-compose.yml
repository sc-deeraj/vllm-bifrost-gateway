networks:
  default:
    name: bifrost-gateway
    driver: bridge

services:
  vllm:
    container_name: vllm-bifrost-gateway-vllm
    # Qwen3.5 is recent: it needs a current vLLM (the v0.9.2 pin cannot load
    # it). Pin a specific tag here once you've verified one; `latest` tracks
    # the newest published image. If a stable tag lacks Qwen3.5 support, use a
    # nightly image (see https://wheels.vllm.ai/nightly).
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    restart: unless-stopped
    # Precision (FP16/FP8/FP4), vision, and optional LoRA flags are assembled
    # by the entrypoint script from the env vars below -- compose `command:`
    # can't express the conditional logic (FP16 = *no* --quantization flag).
    entrypoint: ["/bin/bash", "/vllm-entrypoint.sh"]
    labels:
      service: vllm-inference
      project: bifrost-gateway
    environment:
      # --- model ---
      BASE_MODEL: ${BASE_MODEL:-Qwen/Qwen3.5-9B}
      BASE_MODEL_ID: ${BASE_MODEL_ID:-qwen3.5-9b}
      # --- precision: FP16 (full, default) | FP8 | FP4 ---
      VLLM_PRECISION: ${VLLM_PRECISION:-FP16}
      VLLM_DTYPE: ${VLLM_DTYPE:-}
      VLLM_FP4_METHOD: ${VLLM_FP4_METHOD:-modelopt_fp4}
      # --- capacity / context ---
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-32768}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      VLLM_REASONING_PARSER: ${VLLM_REASONING_PARSER:-qwen3}
      # --- multimodal / vision ---
      VLLM_LANGUAGE_MODEL_ONLY: ${VLLM_LANGUAGE_MODEL_ONLY:-false}
      VLLM_MAX_IMAGES_PER_PROMPT: ${VLLM_MAX_IMAGES_PER_PROMPT:-2}
      # --- optional LoRA hot-swap (off by default for the vision path) ---
      VLLM_ENABLE_LORA: ${VLLM_ENABLE_LORA:-false}
      VLLM_MAX_LORAS: ${VLLM_MAX_LORAS:-2}
      VLLM_MAX_LORA_RANK: ${VLLM_MAX_LORA_RANK:-16}
      VLLM_MAX_CPU_LORAS: ${VLLM_MAX_CPU_LORAS:-4}
      VLLM_EXTRA_ARGS: ${VLLM_EXTRA_ARGS:-}
      # --- runtime ---
      VLLM_ALLOW_RUNTIME_LORA_UPDATING: "True"
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      HF_HOME: /root/.cache/huggingface
    volumes:
      - hf-cache:/root/.cache/huggingface
      - ./loras:/loras
      - ./vllm/entrypoint.sh:/vllm-entrypoint.sh:ro
    # No host port published on purpose: vLLM's runtime LoRA endpoints have
    # no auth of their own, so only the Model Manager (on the internal
    # compose network) may reach this service. See README security notes.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      # Qwen3.5-9B is a large first download + load; give it generous slack.
      start_period: 600s
      retries: 20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  model-manager:
    container_name: vllm-bifrost-gateway-model-manager
    build: ./model-manager
    restart: unless-stopped
    labels:
      service: model-manager
      project: bifrost-gateway
    environment:
      MM_VLLM_BASE_URL: http://vllm:8000
      MM_BASE_MODEL: ${BASE_MODEL:-Qwen/Qwen3.5-9B}
      MM_BASE_MODEL_ID: ${BASE_MODEL_ID:-qwen3.5-9b}
      MM_LORA_DIR: /loras
      MM_REGISTRY_FILE: /loras/registry.json
      MM_ADAPTER_CAPACITY: ${MM_ADAPTER_CAPACITY:-2}
      MM_COLD_START_TIMEOUT_SECONDS: ${MM_COLD_START_TIMEOUT_SECONDS:-90}
      MM_DRAIN_TIMEOUT_SECONDS: ${MM_DRAIN_TIMEOUT_SECONDS:-30}
    volumes:
      - ./loras:/loras
    # Not published to the host: the Model Manager is a control-plane +
    # data-plane endpoint with no auth of its own. Only Bifrost reaches it,
    # over the internal compose network at http://model-manager:9000.
    # Bifrost (8080) is the only public surface. For host-side admin, use
    # `docker compose exec model-manager ...` or `curl` from another service.
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    depends_on:
      vllm:
        condition: service_healthy

  bifrost:
    container_name: vllm-bifrost-gateway-bifrost
    image: maximhq/bifrost:latest
    restart: unless-stopped
    labels:
      service: bifrost-gateway
      project: bifrost-gateway
    environment:
      LOG_LEVEL: info
      LOG_STYLE: json
    volumes:
      - ./bifrost/config.json:/app/data/config.json:ro
      - bifrost-data:/app/data
    ports:
      - "${BIFROST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      model-manager:
        condition: service_healthy

volumes:
  hf-cache:
  bifrost-data:
